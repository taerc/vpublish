definitions:
  handler.CreateCategoryRequest:
    properties:
      description:
        description: 描述信息（最大500字符）
        example: 包含各类无人机飞行、遥控、管理相关应用软件
        maxLength: 500
        type: string
      name:
        description: 类别名称（必填，长度3-100字符）
        example: 无人机应用
        maxLength: 100
        minLength: 3
        type: string
      sort_order:
        description: 排序权重（数值越大越靠后）
        example: 100
        type: integer
    required:
    - name
    type: object
  handler.CreateMCPCredentialRequest:
    properties:
      description:
        description: 描述信息 (最大200字符)
        example: 用于AI助手访问MCP服务
        maxLength: 200
        type: string
      expires_at:
        description: 过期时间 (可选，不填表示永不过期)
        example: "2026-12-31T23:59:59Z"
        type: string
      name:
        description: 凭证名称 (必填，长度1-100)
        example: AI助手凭证
        maxLength: 100
        minLength: 1
        type: string
      permission_level:
        description: '权限级别 (必填，可选值: read_only, read_write)'
        enum:
        - read_only
        - read_write
        example: read_only
        type: string
    required:
    - name
    - permission_level
    type: object
  handler.LoginRequest:
    properties:
      password:
        description: 密码
        example: "123456"
        format: password
        type: string
      username:
        description: 用户名
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  handler.LoginResponse:
    properties:
      expires_in:
        description: Token过期时间(秒)
        example: 86400
        type: integer
      refresh_token:
        description: 刷新Token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      token:
        description: JWT Token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      user:
        description: 用户信息
        properties:
          id:
            description: 用户ID
            example: 1
            type: integer
          nickname:
            description: 昵称
            example: 管理员
            type: string
          role:
            description: 角色
            example: admin
            type: string
          username:
            description: 用户名
            example: admin
            type: string
        type: object
    type: object
  handler.MCPCredentialResponse:
    properties:
      app_key:
        description: AppKey (应用标识)
        example: ak_abc123def456
        type: string
      app_secret:
        description: AppSecret (应用密钥，仅在创建/重新生成时返回)
        example: sk_xyz789uvw012
        type: string
      created_at:
        description: 创建时间
        example: "2026-03-12 10:00:00"
        type: string
      created_by:
        description: 创建人ID
        example: 1
        type: integer
      description:
        description: 描述信息
        example: 用于AI助手访问MCP服务
        type: string
      expires_at:
        description: 过期时间
        example: "2026-12-31 23:59:59"
        type: string
      id:
        description: 凭证ID
        example: 1
        type: integer
      is_active:
        description: 是否启用
        example: true
        type: boolean
      last_used_at:
        description: 最后使用时间
        example: "2026-03-12 10:30:00"
        type: string
      name:
        description: 凭证名称
        example: AI助手凭证
        type: string
      permission_level:
        description: 权限级别 (read_only, read_write)
        example: read_only
        type: string
      updated_at:
        description: 更新时间
        example: "2026-03-12 15:30:00"
        type: string
    type: object
  handler.ProfileResponse:
    properties:
      email:
        description: 邮箱
        example: admin@example.com
        type: string
      id:
        description: 用户ID
        example: 1
        type: integer
      is_active:
        description: 是否启用 (1:启用, 0:禁用)
        example: 1
        type: integer
      nickname:
        description: 昵称
        example: 管理员
        type: string
      role:
        description: 角色
        example: admin
        type: string
      username:
        description: 用户名
        example: admin
        type: string
    type: object
  handler.UpdateCategoryRequest:
    properties:
      description:
        description: 描述信息（最大500字符）
        example: 包含各类无人机飞行、遥控、管理相关应用软件
        maxLength: 500
        type: string
      is_active:
        description: 是否启用
        example: true
        type: boolean
      name:
        description: 类别名称（长度3-100字符）
        example: 无人机应用
        maxLength: 100
        minLength: 3
        type: string
      sort_order:
        description: 排序权重（数值越大越靠后）
        example: 100
        type: integer
    type: object
  handler.UpdateMCPCredentialRequest:
    properties:
      description:
        description: 描述信息 (最大200字符)
        example: 更新后的描述
        maxLength: 200
        type: string
      expires_at:
        description: 过期时间
        example: "2026-12-31T23:59:59Z"
        type: string
      is_active:
        description: 是否启用
        example: true
        type: boolean
      name:
        description: 凭证名称 (长度1-100)
        example: AI助手凭证
        maxLength: 100
        minLength: 1
        type: string
      permission_level:
        description: '权限级别 (可选值: read_only, read_write)'
        enum:
        - read_only
        - read_write
        example: read_write
        type: string
    type: object
  handler.UserCreateRequest:
    properties:
      email:
        description: 邮箱
        example: zhangsan@example.com
        type: string
      nickname:
        description: 昵称
        example: 张三
        type: string
      password:
        description: 密码 (必填，长度8-72，需符合复杂度要求)
        example: Password@123
        format: password
        maxLength: 72
        minLength: 8
        type: string
      role:
        description: 角色 (admin/user)
        example: user
        type: string
      username:
        description: 用户名 (必填，长度3-50)
        example: zhangsan
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  handler.UserResetPasswordRequest:
    properties:
      password:
        description: 新密码 (必填，长度8-72，需符合复杂度要求)
        example: NewPassword@456
        format: password
        maxLength: 72
        minLength: 8
        type: string
    required:
    - password
    type: object
  handler.UserUpdateRequest:
    properties:
      email:
        description: 邮箱
        example: lisi@example.com
        type: string
      is_active:
        description: 是否激活
        example: true
        type: boolean
      nickname:
        description: 昵称
        example: 李四
        type: string
      role:
        description: 角色 (admin/user)
        example: admin
        type: string
    type: object
  model.AppKey:
    properties:
      app_key:
        description: AppKey
        example: abc123def456
        type: string
      app_name:
        description: 应用名称
        example: 移动客户端
        type: string
      created_at:
        description: 创建时间
        example: "2024-03-12T10:00:00Z"
        type: string
      description:
        description: 描述
        example: 用于移动APP的API访问密钥
        type: string
      id:
        description: 主键ID
        example: 1
        type: integer
      is_active:
        description: 是否启用
        example: true
        type: boolean
      updated_at:
        description: 更新时间
        example: "2024-03-12T15:30:00Z"
        type: string
    type: object
  model.Category:
    properties:
      code:
        description: 类别代码 (自动生成的拼音代码)
        example: TYPE_WU_REN_JI_YING_YONG
        type: string
      created_at:
        description: 创建时间
        example: "2024-03-12T10:00:00Z"
        type: string
      description:
        description: 描述
        example: 各类无人机相关应用程序
        type: string
      id:
        description: 主键ID
        example: 1
        type: integer
      is_active:
        description: 是否启用
        example: true
        type: boolean
      name:
        description: 类别名称
        example: 无人机应用
        type: string
      packages:
        description: 关联
        items:
          $ref: '#/definitions/model.Package'
        type: array
      sort_order:
        description: 排序值
        example: 10
        type: integer
      updated_at:
        description: 更新时间
        example: "2024-03-12T15:30:00Z"
        type: string
    type: object
  model.MCPCredential:
    properties:
      app_key:
        description: AppKey
        example: mcp_abc123def456
        type: string
      created_at:
        description: 创建时间
        example: "2024-03-12T10:00:00Z"
        type: string
      created_by:
        description: 创建者ID
        example: 1
        type: integer
      description:
        description: 描述
        example: 用于AI助手集成的MCP凭证
        type: string
      expires_at:
        description: 过期时间
        example: "2025-03-12T00:00:00Z"
        type: string
      id:
        description: 主键ID
        example: 1
        type: integer
      is_active:
        description: 是否启用
        example: true
        type: boolean
      last_used_at:
        description: 最后使用时间
        example: "2024-03-12T15:30:00Z"
        type: string
      name:
        description: 凭证名称
        example: AI助手集成
        type: string
      permission_level:
        description: 权限级别
        example: read_only
        type: string
      updated_at:
        description: 更新时间
        example: "2024-03-12T15:30:00Z"
        type: string
    type: object
  model.Package:
    properties:
      category:
        allOf:
        - $ref: '#/definitions/model.Category'
        description: 关联
      category_id:
        description: 类别ID
        example: 1
        type: integer
      created_at:
        description: 创建时间
        example: "2024-03-12T10:00:00Z"
        type: string
      created_by:
        description: 创建者ID
        example: 1
        type: integer
      creator:
        $ref: '#/definitions/model.User'
      description:
        description: 描述
        example: 专业级无人机飞行控制系统
        type: string
      id:
        description: 主键ID
        example: 1
        type: integer
      is_active:
        description: 是否启用
        example: true
        type: boolean
      latest_version:
        $ref: '#/definitions/model.Version'
      name:
        description: 软件包名称
        example: 无人机控制系统
        type: string
      updated_at:
        description: 更新时间
        example: "2024-03-12T15:30:00Z"
        type: string
      versions:
        items:
          $ref: '#/definitions/model.Version'
        type: array
    type: object
  model.User:
    properties:
      created_at:
        description: 创建时间
        example: "2024-01-01T08:00:00Z"
        type: string
      email:
        description: 邮箱
        example: admin@example.com
        type: string
      id:
        description: 主键ID
        example: 1
        type: integer
      is_active:
        description: 是否启用
        example: true
        type: boolean
      last_login_at:
        description: 最后登录时间
        example: "2024-03-12T15:30:00Z"
        type: string
      last_login_ip:
        description: 最后登录IP
        example: 192.168.1.100
        type: string
      nickname:
        description: 昵称
        example: 系统管理员
        type: string
      role:
        description: 角色
        example: admin
        type: string
      updated_at:
        description: 更新时间
        example: "2024-03-12T15:30:00Z"
        type: string
      username:
        description: 用户名
        example: admin
        type: string
    type: object
  model.Version:
    properties:
      changelog:
        description: |-
          版本信息
          更新日志
        example: |-
          修复关键安全漏洞
          优化性能
        type: string
      created_at:
        description: 创建时间
        example: "2024-03-12T15:45:00Z"
        type: string
      created_by:
        description: |-
          审计
          创建者ID
        example: 1
        type: integer
      creator:
        $ref: '#/definitions/model.User'
      download_count:
        description: |-
          统计
          下载次数
        example: 1523
        type: integer
      file_hash:
        description: 文件SHA256哈希
        example: a1b2c3d4e5f6...
        type: string
      file_name:
        description: 原始文件名
        example: drone-control-2.1.0.zip
        type: string
      file_size:
        description: 文件大小 (字节)
        example: 15728640
        type: integer
      force_upgrade:
        description: |-
          升级控制
          是否强制升级
        example: false
        type: boolean
      id:
        description: 主键ID
        example: 1
        type: integer
      is_latest:
        description: 是否最新版本
        example: true
        type: boolean
      is_stable:
        description: 是否稳定版
        example: true
        type: boolean
      min_version:
        description: 最低兼容版本
        example: 2.0.0
        type: string
      package:
        allOf:
        - $ref: '#/definitions/model.Package'
        description: 关联
      package_id:
        description: 软件包ID
        example: 1
        type: integer
      published_at:
        description: 发布时间
        example: "2024-03-12T16:00:00Z"
        type: string
      release_notes:
        description: 发布说明
        example: 本次更新修复了多个已知问题
        type: string
      updated_at:
        description: 更新时间
        example: "2024-03-12T16:00:00Z"
        type: string
      version:
        description: 版本号
        example: 2.1.0
        type: string
      version_code:
        description: 版本代码 (数值)
        example: 20100
        type: integer
    type: object
  response.PageData:
    properties:
      list: {}
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  service.AppKeyResponse:
    properties:
      app_key:
        type: string
      app_name:
        type: string
      app_secret:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      updated_at:
        type: string
    type: object
  service.ChangePasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 8
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  service.CreateAppKeyRequest:
    properties:
      app_name:
        maxLength: 100
        minLength: 1
        type: string
      description:
        maxLength: 200
        type: string
    required:
    - app_name
    type: object
  service.UpdateAppKeyRequest:
    properties:
      app_name:
        maxLength: 100
        minLength: 1
        type: string
      description:
        maxLength: 200
        type: string
      is_active:
        type: boolean
    type: object
  service.UpdatePackageRequest:
    properties:
      description:
        type: string
      is_active:
        type: boolean
      name:
        type: string
    type: object
info:
  contact: {}
paths:
  /admin/appkeys:
    get:
      consumes:
      - application/json
      description: 获取AppKey分页列表，用于管理APP端认证密钥
      parameters:
      - default: 1
        description: 页码
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        maximum: 100
        minimum: 1
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功，返回AppKey分页列表
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/response.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.AppKey'
                        type: array
                    type: object
              type: object
        "401":
          description: 未认证访问
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - 'BearerAuth ':
        - ""
      summary: 获取AppKey列表
      tags:
      - 管理员/AppKey管理
    post:
      consumes:
      - application/json
      description: 创建新的APP认证密钥，系统自动生成AppKey和AppSecret。注意：AppSecret仅在创建时返回一次，请妥善保存。
      parameters:
      - description: 创建AppKey请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.CreateAppKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功，返回AppKey信息（包含AppSecret）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/service.AppKeyResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未认证访问
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - 'BearerAuth ':
        - ""
      summary: 创建AppKey
      tags:
      - 管理员/AppKey管理
  /admin/appkeys/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定的AppKey，删除后该密钥将无法使用
      parameters:
      - description: AppKey ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 请求参数错误，无效的ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未认证访问
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: AppKey不存在
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - 'BearerAuth ':
        - ""
      summary: 删除AppKey
      tags:
      - 管理员/AppKey管理
    get:
      consumes:
      - application/json
      description: 根据ID获取单个AppKey的详细信息
      parameters:
      - description: AppKey ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功，返回AppKey详情
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.AppKey'
              type: object
        "400":
          description: 请求参数错误，无效的ID
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未认证访问
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: AppKey不存在
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - 'BearerAuth ':
        - ""
      summary: 获取AppKey详情
      tags:
      - 管理员/AppKey管理
    put:
      consumes:
      - application/json
      description: 更新AppKey信息，可修改应用名称、描述和启用状态
      parameters:
      - description: AppKey ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      - description: 更新AppKey请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service.UpdateAppKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功，返回更新后的AppKey信息
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.AppKey'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: 未认证访问
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: AppKey不存在
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - 'BearerAuth ':
        - ""
      summary: 更新AppKey
      tags:
      - 管理员/AppKey管理
  /admin/appkeys/{id}/regenerate:
    post:
      consumes:
      - application/json
      description: 为指定AppKey重新生成AppSecret，旧的Secret将立即失效。注意：新的AppSecret仅在此次返回，请妥善保存。
      parameters:
      - description: AppKey ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 重新生成成功，返回新的AppSecret
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/service.AppKeyResponse'
              type: object
        "400":
          description: 请求参数错误，无效的ID
          schema:
